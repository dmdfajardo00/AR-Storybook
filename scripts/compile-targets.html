<!DOCTYPE html>
<html>
<head>
  <title>MindAR Target Compiler</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
</head>
<body>
  <h1>Compiling...</h1>
  <pre id="log"></pre>
  <script>
    const log = document.getElementById('log');
    function logMsg(msg) {
      log.textContent += msg + '\n';
      console.log(msg);
    }

    async function loadImage(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = url;
      });
    }

    async function compile() {
      try {
        const imageUrls = [];
        for (let i = 0; i < 11; i++) {
          imageUrls.push(`/targets/source-images/target-${String(i).padStart(2, '0')}.png`);
        }

        logMsg('Loading images...');
        const images = [];
        for (const url of imageUrls) {
          logMsg('  Loading ' + url);
          const img = await loadImage(url);
          images.push(img);
        }

        logMsg('\\nCompiling ' + images.length + ' targets...');
        const compiler = new MINDAR.IMAGE.Compiler();
        const dataList = await compiler.compileImageTargets(images, (progress) => {
          logMsg('  Progress: ' + Math.round(progress * 100) + '%');
        });

        logMsg('\\nExporting .mind file...');
        const exportedBuffer = await compiler.exportData();

        // Convert to base64 for download
        const bytes = new Uint8Array(exportedBuffer);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) {
          binary += String.fromCharCode(bytes[i]);
        }
        const b64 = btoa(binary);

        // Store result for Playwright to pick up
        window.__mindFileBase64 = b64;
        window.__mindFileSize = bytes.length;
        window.__compileDone = true;

        logMsg('\\nDone! File size: ' + (bytes.length / 1024).toFixed(0) + ' KB');
        logMsg('COMPILE_COMPLETE');
      } catch (err) {
        logMsg('ERROR: ' + err.message);
        window.__compileError = err.message;
        window.__compileDone = true;
      }
    }

    compile();
  </script>
</body>
</html>
